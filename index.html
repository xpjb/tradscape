<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Tradscape</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="game">
  <canvas id="world" width="720" height="720"></canvas>
  <div id="panel">
    <div id="tabs">
      <button data-tab="inv" class="active">Inv</button>
      <button data-tab="skills">Skills</button>
    </div>
    <div id="tab-inv" class="tab-content">
      <div id="inv-grid"></div>
      <div id="equipped">Equipped: <span id="eq-list">none</span></div>
      <div class="hint">Left-click berries to eat. Tools are inventory items. Buy your first tools from the trader.</div>
    </div>
    <div id="tab-skills" class="tab-content hidden">
      <div id="skills-list"></div>
      <hr>
      <div>HP: <span id="hp-cur">10</span>/<span id="hp-max">10</span></div>
    </div>
  </div>
</div>
<div id="trade-window" class="window hidden">
  <div class="window-card">
    <div class="window-title">
      <span>Trader</span>
      <button id="trade-close" type="button">X</button>
    </div>
    <div class="trade-columns">
      <section>
        <h3>Merchant Stock</h3>
        <div id="shop-buy-list"></div>
      </section>
      <section>
        <h3>Your Inventory</h3>
        <div id="shop-sell-list"></div>
      </section>
    </div>
    <div class="hint">Click a merchant item to buy it. Click one of your items to sell it for its listed value.</div>
  </div>
</div>
<div id="chat-panel">
  <div id="chat-log"></div>
  <form id="chat-form">
    <input id="chat-input" type="text" maxlength="160" autocomplete="off" placeholder="Global chat...">
    <button type="submit">Send</button>
  </form>
</div>
<script type="module" src="main.js"></script>
</body>
</html>
